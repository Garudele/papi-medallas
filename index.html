<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B6B">
  <title>Para Papá · Semana de medallas</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Un regalo te espera, papá 🎁">
  <meta property="og:description" content="Tu semana de medallas — toca para abrir">
  <meta property="og:image" content="https://garudele.github.io/papi-medallas/assets/share-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://garudele.github.io/papi-medallas/regalo.html">
  <meta property="og:locale" content="es_MX">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Un regalo te espera, papá 🎁">
  <meta name="twitter:description" content="Tu semana de medallas — toca para abrir">
  <meta name="twitter:image" content="https://garudele.github.io/papi-medallas/assets/share-card.png">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lock-screen" class="lock-screen">
    <div class="lock-card">
      <div class="lock-emoji">🎁</div>
      <h2>Un regalo te espera</h2>
      <p class="lock-hint">Solo tú sabes la contraseña.</p>
      <form id="lock-form">
        <input type="password" id="lock-input" autocomplete="off" placeholder="Contraseña" required>
        <button type="submit">Abrir 💛</button>
      </form>
      <p id="lock-error" class="lock-error" hidden>Contraseña incorrecta</p>
    </div>
  </div>

  <div id="app-wrap" hidden>
  <header class="hero">
    <div class="hero-emoji">🎖️</div>
    <h1 id="titulo">Para Papá</h1>
    <p id="subtitulo" class="subtitle">Tu mes de medallas</p>
    <p id="contador" class="counter"></p>
    <div class="noti-zone">
      <button id="noti-btn" class="noti-btn" hidden>🔔 Activar recordatorios diarios</button>
      <p id="noti-status" class="noti-status"></p>
      <button id="noti-test" class="noti-btn" style="display:none;background:linear-gradient(135deg,#7BC97A,#9DD978);box-shadow:0 6px 16px rgba(123,201,122,0.35);margin-top:4px;">🧪 Probar noti ahora</button>
    </div>
  </header>

  <main>
    <section id="grid" class="grid" aria-label="Reconocimientos diarios"></section>
  </main>

  <footer class="footer">
    <p>Hecho con 💖</p>
  </footer>
  </div>

  <dialog id="modal" class="modal" aria-labelledby="modal-titulo">
    <button class="modal-close" aria-label="Cerrar" data-close>✕</button>
    <div class="modal-body">
      <div class="modal-emoji" id="modal-emoji"></div>
      <p class="modal-etiqueta" id="modal-etiqueta"></p>
      <h2 id="modal-titulo"></h2>
      <p class="modal-fecha" id="modal-fecha"></p>
      <div class="modal-foto-wrap">
        <img id="modal-foto" alt="" />
      </div>
      <p class="modal-mensaje" id="modal-mensaje"></p>
    </div>
  </dialog>

  <script src="app.js"></script>
  <script src="notifications.js"></script>
</body>
</html>

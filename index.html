<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B6B">
  <title>Para Papá · Mes de medallas</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero-emoji">🎖️</div>
    <h1 id="titulo">Para Papá</h1>
    <p id="subtitulo" class="subtitle">Tu mes de medallas</p>
    <p id="contador" class="counter"></p>
  </header>

  <main>
    <section id="grid" class="grid" aria-label="Reconocimientos diarios"></section>
  </main>

  <footer class="footer">
    <p>Hecho con 💖</p>
  </footer>

  <dialog id="modal" class="modal" aria-labelledby="modal-titulo">
    <button class="modal-close" aria-label="Cerrar" data-close>✕</button>
    <div class="modal-body">
      <div class="modal-emoji" id="modal-emoji"></div>
      <p class="modal-etiqueta" id="modal-etiqueta"></p>
      <h2 id="modal-titulo"></h2>
      <p class="modal-fecha" id="modal-fecha"></p>
      <div class="modal-foto-wrap">
        <img id="modal-foto" alt="" />
      </div>
      <p class="modal-mensaje" id="modal-mensaje"></p>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>

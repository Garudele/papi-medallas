<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B6B">
  <meta name="robots" content="noindex,nofollow">
  <title>Preview · Papi Medallas</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background:
      radial-gradient(at top left, #FFE3C6 0%, transparent 50%),
      radial-gradient(at top right, #FFD6E0 0%, transparent 50%),
      var(--bg);
      padding-bottom: 60px;
    }
    .preview-header {
      text-align: center;
      padding: 30px 20px 16px;
    }
    .preview-header h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .preview-header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .preview-stack {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .preview-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 28px 22px 24px;
      text-align: center;
    }
    .pc-emoji {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 6px 12px rgba(255, 107, 107, 0.3));
    }
    .pc-etiqueta {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pc-titulo {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .pc-fecha {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .pc-foto {
      margin: 18px 0 14px;
      border-radius: 14px;
      background: var(--bg-2);
      aspect-ratio: 4 / 3;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pc-foto img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: var(--bg-2);
    }
    .pc-foto.placeholder {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px;
    }
    .pc-mensaje {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
    }
    .pc-tag {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 10px;
      background: var(--bg-2);
      color: var(--muted);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="preview-header">
    <h1>👀 Preview · Papi Medallas</h1>
    <p>Así se ve cada medalla al abrirse. Esto es solo para que vos revises antes del deploy real.</p>
  </div>
  <div class="preview-stack" id="stack"></div>

  <script>
    const data = [
      { dia: 21, fecha: "Domingo · 21 de junio", emoji: "🥇", etiqueta: "Día del Padre",
        titulo: "Mejor Papá del Universo", imgN: 3,
        mensaje: "Esta foto resume lo que eres: nuestra alegría. Hoy es tu día y quiero que sepas que ser papá te queda perfecto. Te amamos." },
      { dia: 22, fecha: "Lunes · 22 de junio", emoji: "🍼", etiqueta: "Equipo de toda la vida",
        titulo: "Hora del Biberón", imgN: 1,
        mensaje: "Una de sus primeras fotos juntos. La forma en que la sostienes, la confianza con la que ella se deja querer. Así han sido desde el principio." },
      { dia: 23, fecha: "Martes · 23 de junio", emoji: "🤱", etiqueta: "Pose tímida, abrazo seguro",
        titulo: "El Mejor Rebozo del Mundo", imgN: 5,
        mensaje: "La traes pegadita, ella ya casi dormida con su mamila en la mano. Y tú, posando medio tímido para la foto. Así eres — papá silencioso pero ahí, siempre." },
      { dia: 24, fecha: "Miércoles · 24 de junio", emoji: "🎈", etiqueta: "Diversión modo papá",
        titulo: "Compañero de Aventuras", imgN: 4,
        mensaje: "Cualquier lugar contigo es una aventura para ella. Ojalá nunca pierdas las ganas de jugar tan bonito." },
      { dia: 25, fecha: "Jueves · 25 de junio", emoji: "💤", etiqueta: "Sueño profundo garantizado",
        titulo: "Pecho-Cuna Oficial", imgN: 2,
        mensaje: "Tu pecho es donde ella sueña mejor. Y desde aquí veo que tú también descansas distinto cuando la tienes así." },
      { dia: 26, fecha: "Viernes · 26 de junio", emoji: "😊", etiqueta: "Tu obra de cada día",
        titulo: "Tu Sonrisa, Mi Sonrisa", imgN: 6,
        mensaje: "Esta sonrisa la pusiste tú. Cada día le das motivos para sonreír así, y a mí me das motivos para enamorarme más." },
      { dia: 27, fecha: "Sábado · 27 de junio", emoji: "🎅", etiqueta: "Recuerdo de oro",
        titulo: "Papá de Postal Navideña", imgN: 7,
        mensaje: "Su primera Navidad y tú cargándola así. Esta foto es de las que vamos a enseñar mil veces. La miras y se te entibia el corazón, ¿verdad?" },
      { dia: 28, fecha: "Domingo · 28 de junio", emoji: "🏊", etiqueta: "Salvavidas profesional",
        titulo: "Capitán del Chapuzón", imgN: 9,
        mensaje: "Contigo nada le da miedo. Ese día en el agua fue suyo porque tú estabas ahí. Gracias por ser su escudo siempre." },
      { dia: 29, fecha: "Lunes · 29 de junio", emoji: "🥩", etiqueta: "Asiento de primera fila",
        titulo: "Su Primera Carnita", imgN: 8,
        mensaje: "La primera vez que probó carne. Y tú ahí en primera fila, como siempre. Vas a estar para todas sus primeras veces — eso es ser papá." },
      { dia: 30, fecha: "Martes · 30 de junio", emoji: "💖", etiqueta: "Cierre con luz",
        titulo: "Tu Mejor Obra", imgN: 10,
        mensaje: "Mira esta cara. Eso eres tú haciéndola feliz. Esta semana termina pero esto sigue cada día. Gracias por ser su papá y mi compañero. Te amamos." }
    ];

    const stack = document.getElementById('stack');
    for (const m of data) {
      const div = document.createElement('div');
      div.className = 'preview-card';
      div.innerHTML = `
        <div class="pc-emoji">${m.emoji}</div>
        <div class="pc-etiqueta">${m.etiqueta}</div>
        <div class="pc-titulo">${m.titulo}</div>
        <div class="pc-fecha">${m.fecha}</div>
        <div class="pc-foto"><img src="assets/preview-fotos/imagen${m.imgN}.jpg" alt="Imagen ${m.imgN}" loading="lazy"></div>
        <div class="pc-mensaje">${m.mensaje}</div>
        <div class="pc-tag">Día ${m.dia}</div>
      `;
      stack.appendChild(div);
    }
  </script>
</body>
</html>
